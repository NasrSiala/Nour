kind = "web"
previewPath = "/"
title = "SchoolBox Offline"
version = "1.0.0"
id = "artifacts/schoolbox"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23259

[services.development]
run = "pnpm --filter @workspace/schoolbox run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/schoolbox", "run", "build" ]
publicDir = "artifacts/schoolbox/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23259"
BASE_PATH = "/"
